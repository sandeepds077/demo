name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

env:
  APP_NAME: demo-python-app
  ENVIRONMENT: testing
  FEATURE_FLAG: ${{ vars.FEATURE_FLAG }}
  LOG_LEVEL: ${{ vars.LOG_LEVEL }}
  API_TOKEN: ${{ secrets.API_TOKEN }}
  DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

jobs:
  build:
    runs-on:
      - self-hosted
      - linux

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use preinstalled Python
        run: |
          python3 --version
          which python3

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Verify environment
        run: |
          echo "Runner OS: $RUNNER_OS"
          python3 --version
          echo "APP_NAME=$APP_NAME"
          echo "ENVIRONMENT=$ENVIRONMENT"
          echo "FEATURE_FLAG=$FEATURE_FLAG"
          echo "LOG_LEVEL=$LOG_LEVEL"
          if [ -n "$API_TOKEN" ]; then echo "API_TOKEN is configured"; else echo "API_TOKEN is not configured"; fi
          if [ -n "$DB_PASSWORD" ]; then echo "DB_PASSWORD is configured"; else echo "DB_PASSWORD is not configured"; fi

      - name: Run Python app
        run: |
          python3 app.py
